<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hospital Bed Availability - India</title>
  <link rel="stylesheet" href="/assets/main.css" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
</head>
<body>
  <header>
    <h1>Hospital Bed Availability - India</h1>
    <div class="actions">
      <a href="/admin.html">Admin Panel</a>
      <button id="refreshBtn" class="primary">Refresh</button>
    </div>
  </header>

  <div class="container">
    <div class="cards" id="wardCards">
      <div class="card"><h3>General</h3><div id="generalSummary">—</div></div>
      <div class="card"><h3>ICU</h3><div id="icuSummary">—</div></div>
      <div class="card"><h3>Emergency</h3><div id="emergencySummary">—</div></div>
      <div class="card"><h3>Operation</h3><div id="operationSummary">—</div></div>
    </div>

    <div class="controls">
      <input id="searchInput" type="text" placeholder="Search by hospital name..." />
      <select id="wardFilter">
        <option value="">All Wards</option>
        <option>General</option>
        <option>ICU</option>
        <option>Emergency</option>
        <option>Operation</option>
      </select>
      <button id="clearFilters" class="primary">Clear Filters</button>
    </div>

    <div class="table-wrap">
      <table id="bedsTable">
        <thead>
          <tr>
            <th data-key="hospital">Hospital</th>
            <th data-key="ward">Ward</th>
            <th data-key="total">Total</th>
            <th data-key="available">Available</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="section">
      <h2>India Map</h2>
      <div id="map"></div>
    </div>

    <div class="section">
      <h2>General Ward</h2>
      <div id="generalList" class="list"></div>
    </div>
    <div class="section">
      <h2>ICU</h2>
      <div id="icuList" class="list"></div>
    </div>
    <div class="section">
      <h2>Emergency</h2>
      <div id="emergencyList" class="list"></div>
    </div>
    <div class="section">
      <h2>Operation Ward</h2>
      <div id="operationList" class="list"></div>
    </div>
  </div>

  <div class="chatbot">
    <button id="chatToggle" class="chatbot-toggle primary">AI</button>
    <div id="chatPanel" class="chatbot-panel">
      <div class="chatbot-header">
        <span>Emergency Assistant</span>
        <button id="chatClose" title="Close">✕</button>
      </div>
      <div id="chatBody" class="chatbot-body"></div>
      <div class="chatbot-input">
        <input id="chatInput" type="text" placeholder="e.g., Need ICU near me" />
        <button id="chatSend" class="primary">Send</button>
      </div>
    </div>
  </div>

  <div class="toasts" id="toasts"></div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="/assets/app.js"></script>
</body>
</html>
