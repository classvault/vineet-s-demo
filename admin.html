<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin - Update Bed Availability</title>
  <link rel="stylesheet" href="/assets/main.css" />
</head>
<body>
  <header>
    <h1>Admin Panel</h1>
    <div class="actions">
      <a href="/index.html">Back to Dashboard</a>
    </div>
  </header>

  <div class="container">
    <div class="card">
      <h3>Update Bed Counts</h3>
      <div class="controls" style="grid-template-columns: repeat(2, 1fr); margin-top: 0;">
        <input id="hospital" type="text" placeholder="Hospital name (exact)" />
        <select id="ward">
          <option>General</option>
          <option>ICU</option>
          <option>Emergency</option>
          <option>Operation</option>
        </select>
        <input id="total" type="number" placeholder="Total beds (optional)" />
        <input id="available" type="number" placeholder="Available beds (optional)" />
      </div>
      <div style="display:flex; gap:12px; margin-top:12px;">
        <button id="submitBtn" class="primary">Submit Update</button>
        <button id="loadExample" class="primary">Load Example</button>
      </div>
      <div id="result" style="margin-top:12px; opacity:0.9;"></div>
    </div>

    <div class="section">
      <h2>Current Records</h2>
      <div class="table-wrap">
        <table id="adminTable">
          <thead>
            <tr>
              <th>Hospital</th>
              <th>Ward</th>
              <th>Total</th>
              <th>Available</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/assets/admin.js"></script>
</body>
</html>
